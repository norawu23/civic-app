name: CI

# A1 scope note: this workflow file is owned by A1 ONLY for the `migrations`
# and `column-refs` jobs below (docs/specs/A1-migration-squash.md in-scope
# list). Other chunks (lint, content validation, Vitest, db test, build,
# Playwright — ARCHITECTURE §7) append their own jobs to this file; do not
# fold their work into the two jobs here.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── migrations-from-empty ────────────────────────────────────────────────
  # Provisions a clean shadow DB, applies supabase/migrations/ from empty,
  # and runs the deny-all smoke + xp_awards seed assertions against it.
  # Red on any failure (ARCHITECTURE §2.1.3 / §6, spec DoD item 5).
  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      # `supabase db start` needs a config.toml. A1 does not check one into
      # the repo (out of scope + would collide with other chunks), so we
      # generate a throwaway one here for the shadow DB. Migrations in
      # supabase/migrations/ are applied automatically on start.
      - name: Initialise a throwaway Supabase project
        run: |
          mkdir -p ci-shadow
          cp -r supabase ci-shadow/supabase
          # `supabase init` refuses if config.toml already exists; it won't.
          (cd ci-shadow && supabase init || true)

      - name: Apply migrations from empty (shadow DB)
        run: |
          cd ci-shadow
          supabase db start
          # `db start` applies supabase/migrations/*.sql in order from empty.
          # A non-zero exit above already reds the job; this is the
          # migrations-from-empty gate itself.

      - name: xp_awards seed assertion (text-level, no DB needed)
        run: node tests/xp-awards-seed.test.mjs

      - name: Deny-all smoke (anon + authed SELECT denied under default-deny)
        run: |
          # Point the smoke test at the job's already-running shadow stack via
          # CIVIC_TEST_DB_URL. Without it the test self-provisions a SECOND
          # stack, which collides with this one on the CLI's default ports —
          # the root cause of this job's first-six-runs failures (D-017).
          DB_URL=$(cd ci-shadow && supabase status -o env | grep '^DB_URL=' | cut -d '=' -f2- | tr -d '"')
          CIVIC_TEST_DB_URL="$DB_URL" node tests/deny-all-smoke.test.mjs

      - name: Stop shadow DB
        if: always()
        run: cd ci-shadow && supabase stop --no-backup || true

  # ── auth ──────────────────────────────────────────────────────────────────
  # A2 scope note: this job is owned by A2 (docs/specs/A2-auth-trigger-
  # username.md in-scope list — "`.github/workflows/ci.yml` (extend — a new
  # `auth` job only)"). Do not fold other chunks' work into it, and do not
  # fold this job's work into `migrations` above (A1's job).
  #
  # Exercises 0002_auth.sql (the on_auth_user_created trigger +
  # username_available RPC) against the job's single shadow stack with the
  # full migration chain applied from empty. Both suites consume the stack
  # via CIVIC_TEST_DB_URL (one stack per job — a second concurrent stack
  # collides on the CLI's default ports, D-017); they still SKIP (exit 0),
  # not fail, when run with neither Docker nor CIVIC_TEST_DB_URL available.
  auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Initialise a throwaway Supabase project
        run: |
          mkdir -p ci-shadow-auth
          cp -r supabase ci-shadow-auth/supabase
          (cd ci-shadow-auth && supabase init || true)

      - name: Apply migrations from empty (shadow DB)
        run: cd ci-shadow-auth && supabase db start

      - name: Auth trigger test suite (signup happy path, under-13 non-persistence, collision/missing-metadata fallback, double-fire idempotency)
        run: |
          DB_URL=$(cd ci-shadow-auth && supabase status -o env | grep '^DB_URL=' | cut -d '=' -f2- | tr -d '"')
          CIVIC_TEST_DB_URL="$DB_URL" node tests/auth/trigger.test.mjs

      - name: username_available RPC test suite (taken/short/long/free, anon + authenticated callable)
        run: |
          DB_URL=$(cd ci-shadow-auth && supabase status -o env | grep '^DB_URL=' | cut -d '=' -f2- | tr -d '"')
          CIVIC_TEST_DB_URL="$DB_URL" node tests/auth/username-available.test.mjs

      - name: Stop shadow DB
        if: always()
        run: cd ci-shadow-auth && supabase stop --no-backup || true

  # ── column-refs ──────────────────────────────────────────────────────────
  # Greps src/ for supabase-js table/column references and fails on any
  # reference to a table/column absent from 0001_schema.sql (spec DoD item
  # 6). Also runs the negative test proving the gate reddens on a fake column.
  # ── rls ───────────────────────────────────────────────────────────────────
  # A3 scope note: this job is owned by A3 (docs/specs/A3-rls-column-restriction.md
  # in-scope list — "`.github/workflows/ci.yml` (extend — a new `rls` job
  # only, per the per-chunk scope-note convention)"). Do not fold other
  # chunks' work into it, and do not fold this job into `migrations` above
  # (owned exclusively by A1).
  #
  # Provisions its own throwaway shadow DB (mirrors the `migrations` job's
  # pattern above) with supabase/migrations/ applied from empty — which
  # includes 0003_policies.sql (A3) and, once merged, 0002_auth.sql (A2) —
  # then runs the RLS policy-suite and column-restriction-trigger integration
  # tests against it. Both test files self-skip (exit 0) when Docker/psql are
  # unavailable (A1's deny-all-smoke precedent); on ubuntu-latest both are
  # present, so this job genuinely exercises the deny-path matrix here.
  rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Initialise a throwaway Supabase project
        run: |
          mkdir -p ci-shadow-rls
          cp -r supabase ci-shadow-rls/supabase
          (cd ci-shadow-rls && supabase init || true)

      - name: Apply migrations from empty (shadow DB)
        run: cd ci-shadow-rls && supabase db start

      - name: RLS policy suite (deny-path per policy per table)
        run: |
          # One stack per job: both suites consume this job's shadow via
          # CIVIC_TEST_DB_URL instead of self-provisioning colliding stacks
          # (D-017).
          DB_URL=$(cd ci-shadow-rls && supabase status -o env | grep '^DB_URL=' | cut -d '=' -f2- | tr -d '"')
          CIVIC_TEST_DB_URL="$DB_URL" node tests/rls/policies.test.mjs

      - name: profiles column-restriction trigger
        run: |
          DB_URL=$(cd ci-shadow-rls && supabase status -o env | grep '^DB_URL=' | cut -d '=' -f2- | tr -d '"')
          CIVIC_TEST_DB_URL="$DB_URL" node tests/rls/column-restriction.test.mjs

      - name: Stop shadow DB
        if: always()
        run: cd ci-shadow-rls && supabase stop --no-backup || true

  # ── column-refs ──────────────────────────────────────────────────────────
  # Greps src/ for supabase-js table/column references and fails on any
  # reference to a table/column absent from 0001_schema.sql (spec DoD item
  # 6). Also runs the negative test proving the gate reddens on a fake column.

  column-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Column-reference gate (src/ vs 0001 DDL)
        run: node scripts/check-column-refs.mjs

      - name: Negative test (fake column must red the gate)
        run: node tests/column-refs-negative.test.mjs

  # ── calibration ──────────────────────────────────────────────────────────
  # E1 scope note: this job is owned by E1 (docs/specs/E1-rubric-golden-set.md
  # in-scope list — "`.github/workflows/ci.yml` (extend — `calibration` job
  # only)"). Do not fold other chunks' work into this job.
  #
  # Runs the nuance-scoring golden-set calibration harness: 20 hand-modeled
  # fixtures (tests/nuance/golden-set.json) scored by the reference
  # implementation (tests/nuance/reference-scorer.mjs) and compared to each
  # fixture's expected_score. This is the calibration gate B4's SQL scoring
  # function must pass before merge (blocks B4 merge per the spec header).
  #
  # CALIBRATION_TARGET=reference runs now (zero-dep, no DB needed).
  # CALIBRATION_TARGET=rpc is wired but SKIPPED until B4 lands
  # rpc.submit_nuance_session — flip this env var to `rpc` once B4 merges
  # (see the TODO in tests/nuance/calibration.test.js); rpc mode then becomes
  # the required CI mode per the spec's "Interfaces exposed".
  calibration:
    runs-on: ubuntu-latest
    env:
      CALIBRATION_TARGET: reference
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Nuance rubric calibration harness (golden set vs reference scorer)
        run: node tests/nuance/calibration.test.js

  # ── content ───────────────────────────────────────────────────────────────
  # H1 scope note: this job is owned by H1 (docs/specs/H1-content-pipeline.md
  # in-scope list — "`.github/workflows/ci.yml` (extend — `content` job
  # only)"). Do not fold other chunks' work into it.
  #
  # validate -> lint -> seed against a shadow DB, in that order (spec DoD).
  # Later chunks whose jobs read quiz_answer_keys/topics_catalog (B1's RPC
  # tests) should declare `needs: [content]` on their own job once added.
  #
  # factcheck.org handling (operator, D-007): `content:lint` correctly ERRORS
  # on factcheck.org (a real known D-004 violation H2–H5 will replace). But a
  # permanently-red job would block every other chunk's merge for weeks under
  # "all red = no merge". So the lint step is advisory (continue-on-error) and
  # the job only REDS on lint errors ON OR AFTER the content-compliance
  # deadline (end of week 4). Before then the violation is loudly annotated
  # but non-blocking — same forcing-function pattern as E1's provisional gate.
  content:
    runs-on: ubuntu-latest
    env:
      CONTENT_COMPLIANCE_DEADLINE: '2026-07-31'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Content pipeline test suite (fixtures — validator/linter/seeder)
        run: npm run content:test

      - name: Validate content schema (must pass on all 5 files unmodified — D-004)
        run: npm run content:validate

      - name: Lint source tiers (advisory until the compliance deadline — factcheck.org, D-004/D-007)
        id: lint
        continue-on-error: true
        run: npm run content:lint

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Initialise a throwaway Supabase project (shadow DB for seeding)
        run: |
          mkdir -p ci-shadow-content
          cp -r supabase ci-shadow-content/supabase
          (cd ci-shadow-content && supabase init || true)

      - name: Apply migrations from empty (shadow DB)
        run: cd ci-shadow-content && supabase db start

      - name: Seed content into the shadow DB, twice (idempotency at the DB level)
        run: |
          DB_URL=$(cd ci-shadow-content && supabase status -o env | grep '^DB_URL=' | cut -d '=' -f2- | tr -d '"')
          node scripts/content/seed.mjs > /tmp/content-seed.sql
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f /tmp/content-seed.sql
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f /tmp/content-seed.sql

      - name: Assert row counts (5 topics_catalog, 10 quiz_answer_keys)
        run: |
          DB_URL=$(cd ci-shadow-content && supabase status -o env | grep '^DB_URL=' | cut -d '=' -f2- | tr -d '"')
          CATALOG_COUNT=$(psql "$DB_URL" -t -A -c "select count(*) from public.topics_catalog;")
          ANSWERKEY_COUNT=$(psql "$DB_URL" -t -A -c "select count(*) from public.quiz_answer_keys;")
          echo "topics_catalog rows: $CATALOG_COUNT"
          echo "quiz_answer_keys rows: $ANSWERKEY_COUNT"
          test "$CATALOG_COUNT" = "5" || { echo "FAIL: expected 5 topics_catalog rows, got $CATALOG_COUNT"; exit 1; }
          test "$ANSWERKEY_COUNT" = "10" || { echo "FAIL: expected 10 quiz_answer_keys rows, got $ANSWERKEY_COUNT"; exit 1; }

      - name: Stop shadow DB
        if: always()
        run: cd ci-shadow-content && supabase stop --no-backup || true

      - name: Red the job on source-tier errors only at/after the compliance deadline (D-007)
        if: steps.lint.outcome == 'failure'
        run: |
          TODAY=$(date -u +%F)
          if [[ "$TODAY" > "$CONTENT_COMPLIANCE_DEADLINE" || "$TODAY" == "$CONTENT_COMPLIANCE_DEADLINE" ]]; then
            echo "::error::content:lint errors persist on/after the $CONTENT_COMPLIANCE_DEADLINE content-compliance deadline (factcheck.org, D-004). Reddening."
            exit 1
          fi
          echo "::warning::content:lint reported errors (expected: factcheck.org, D-004). Tracked and NON-blocking until $CONTENT_COMPLIANCE_DEADLINE (D-007); H2–H5 replace the citation before then."

  # ── rpc-grading ────────────────────────────────────────────────────────────
  # B1 scope note: this job is owned by B1 (docs/specs/B1-l1-grading.md
  # in-scope list — "`.github/workflows/ci.yml` (extend — a new `rpc-grading`
  # job only, per the per-chunk job convention)"). Do not fold other chunks'
  # work into it, and do not fold this job's work into any job above.
  #
  # Provisions its own throwaway shadow DB (mirrors the `rls` job's pattern)
  # with supabase/migrations/ applied from empty — now including B1's
  # 0004_rpc_grading.sql — then runs the B1 grading suite against it. The
  # suite seeds quiz_answer_keys/topics_catalog itself via H1's idempotent
  # `content:seed` generator and reads the answer keys back from the DB, so
  # it needs the content pipeline healthy first: `needs: [content]` per H1's
  # job note above ("later chunks whose jobs read quiz_answer_keys/
  # topics_catalog (B1's RPC tests) should declare needs: [content]"). The
  # suite self-skips (exit 0) when neither Docker nor CIVIC_TEST_DB_URL is
  # available, per the established convention.
  rpc-grading:
    runs-on: ubuntu-latest
    needs: [content]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Initialise a throwaway Supabase project
        run: |
          mkdir -p ci-shadow-rpc-grading
          cp -r supabase ci-shadow-rpc-grading/supabase
          (cd ci-shadow-rpc-grading && supabase init || true)

      - name: Apply migrations from empty (shadow DB)
        run: cd ci-shadow-rpc-grading && supabase db start

      - name: B1 grading RPC suite (complete_flashcards / complete_quiz / helpers / grant wall)
        run: |
          # One stack per job: the suite consumes this job's shadow via
          # CIVIC_TEST_DB_URL instead of self-provisioning a colliding
          # second stack (D-017).
          DB_URL=$(cd ci-shadow-rpc-grading && supabase status -o env | grep '^DB_URL=' | cut -d '=' -f2- | tr -d '"')
          CIVIC_TEST_DB_URL="$DB_URL" node tests/rpc/b1-grading.test.mjs

      - name: Stop shadow DB
        if: always()
        run: cd ci-shadow-rpc-grading && supabase stop --no-backup || true
